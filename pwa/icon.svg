<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Watch band top -->
  <rect x="196" y="20" width="120" height="80" rx="16" fill="#0f3460"/>
  <!-- Watch band bottom -->
  <rect x="196" y="412" width="120" height="80" rx="16" fill="#0f3460"/>
  <!-- Watch body -->
  <circle cx="256" cy="256" r="180" fill="#0f3460" stroke="#00d2ff" stroke-width="4"/>
  <!-- Watch face -->
  <circle cx="256" cy="256" r="155" fill="#0a0a1a"/>
  <!-- Hour marks -->
  <g stroke="#00d2ff" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="115" x2="256" y2="130"/>
    <line x1="256" y1="382" x2="256" y2="397"/>
    <line x1="115" y1="256" x2="130" y2="256"/>
    <line x1="382" y1="256" x2="397" y2="256"/>
  </g>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="170" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="310" y2="200" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="8" fill="#00d2ff"/>
  <!-- BLE icon (simplified) -->
  <g transform="translate(330, 160)" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,20 L15,10 L0,0 L15,-10 L0,-20" transform="translate(0,20)"/>
  </g>
</svg>
